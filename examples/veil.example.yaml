# veil configuration — https://github.com/mathu97/dbveil
# Copy to veil.yaml and edit. Secrets never live in this file — the `url` of each
# database is a *reference* resolved at connect time, by scheme:
#
#   op://vault/item/field   -> 1Password CLI (uses your existing op auth)
#   gcp://project/secret     -> GCP Secret Manager (coming soon)
#   env://VAR_NAME           -> environment variable
#   ${VAR}                   -> inline env expansion (kept out of the file)
#   postgresql://…           -> a literal DSN

# --- Multiple named instances: the agent picks one per query (default if omitted) ---
databases:
  staging:
    url: op://Engineering/veil-staging-db/dsn
  prod:
    url: op://Engineering/veil-prod-db/dsn
    # per-instance overrides are optional; otherwise the shared guard/redact below apply
    guard:
      max_rows: 200
default: staging

# (Single-DB still works: replace the block above with
#   database:
#     url: ${VEIL_DATABASE_URL}
# and veil treats it as the lone "default" instance.)

# --- Shared guard + redaction, applied to every instance unless it overrides them ---
guard:
  allow_select_star: false      # block SELECT * on PII tables; force explicit column lists
  max_rows: 1000
  statement_timeout_ms: 15000
  pii_tables:
    - contacts
    - users

redact:
  builtin_patterns:
    email: true
    phone: true
    credit_card: true           # Luhn-checked to cut false positives
    ssn: true
    ip: false
  hash_salt: ""                 # set a stable secret to keep hashed values join-able across runs
  columns:
    - { column: email, strategy: hash }
    - { column: phone, strategy: mask }
    - { column: full_name, strategy: mask }
    - { column: ssn, strategy: partial, keep: 4 }
  ner:
    enabled: false
    engine: presidio            # presidio | llm

audit_log: veil-audit.jsonl
